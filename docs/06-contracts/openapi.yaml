openapi: 3.1.0
info:
  title: Terra Commerce Public API
  version: 1.0.0
  description: Normative machine-readable API baseline for Terra Commerce. Public clients call the Go gateway under /api/v1. Custom x-terra-*
    fields are required implementation metadata.
servers:
- url: https://platform.example.com/api/v1
  description: Global administration
- url: https://{tenant}.admin.example.com/api/v1
  description: Tenant administration
  variables:
    tenant:
      default: demo
- url: https://{tenant}.shop.example.com/api/v1
  description: Tenant storefront
  variables:
    tenant:
      default: demo
tags:
- name: Catalog
- name: Inventory and WMS
- name: OMS
- name: Platform
- name: Reporting and Realtime
- name: Shipments
- name: Storefront
- name: Tenant Administration
- name: Webhooks
components:
  securitySchemes:
    sessionCookie:
      $ref: ./openapi-components.json#/securitySchemes/sessionCookie
    oidcBearer:
      $ref: ./openapi-components.json#/securitySchemes/oidcBearer
    biteshipWebhookAuth:
      $ref: ./openapi-components.json#/securitySchemes/biteshipWebhookAuth
    midtransWebhookAuth:
      $ref: ./openapi-components.json#/securitySchemes/midtransWebhookAuth
